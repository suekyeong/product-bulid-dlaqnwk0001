
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>로또 번호 생성기</h1>
    <div class="lotto-container" id="lotto-container"></div>
    <button id="generator-btn">번호 생성</button>

    <div class="contact-section">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xojyydan" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="성함/업체명" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="이메일 주소" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
