<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또번호 생성 - 로또 & AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="active">로또번호 생성</a>
        <a href="animal-test.html">동물상 테스트</a>
        <a href="contact.html">제휴 문의</a>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 모드 전환</button>
    </nav>

    <h1>로또 번호 생성기</h1>
    <div class="lotto-container" id="lotto-container"></div>
    <button id="generator-btn">번호 생성</button>

    <div id="disqus_thread" style="width: 100%; max-width: 800px; margin-top: 50px; padding: 25px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);"></div>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;  
            this.page.identifier = 'lotto-generator-main'; 
        };
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://product-p3teaxteti.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

    <script src="main.js"></script>
</body>
</html>
