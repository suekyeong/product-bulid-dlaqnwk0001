<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 로또 & AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html">번호 생성</a>
        <a href="animal-test.html" class="active">동물상 테스트</a>
        <a href="contact.html">제휴 문의</a>
    </nav>

    <div class="test-container">
        <h1>AI 동물상 테스트</h1>
        <p class="test-desc">얼굴 사진을 올리면 닮은 동물을 알려드려요!</p>
        
        <div id="upload-box">
            <input type="file" id="image-input" accept="image/*" onchange="handleImageUpload(event)" style="display: none;">
            <div id="image-preview" onclick="document.getElementById('image-input').click()">
                <p>클릭하여 사진 업로드</p>
                <img id="face-image" src="" alt="미리보기" style="display: none; width: 100%; height: 100%; object-fit: cover;">
            </div>
            <button type="button" id="predict-btn" onclick="predict()" style="display: none; margin-top: 20px;">분석 시작</button>
        </div>

        <div id="result-container" style="display: none; margin-top: 30px;">
            <div id="label-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/tlkfAY-kP/";
        let model, labelContainer, maxPredictions;

        // 모델 미리 로드
        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
        }
        loadModel();

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById("face-image");
                img.src = e.target.result;
                img.style.display = "block";
                document.querySelector("#image-preview p").style.display = "none";
                document.getElementById("predict-btn").style.display = "inline-block";
                document.getElementById("result-container").style.display = "none";
            }
            reader.readAsDataURL(file);
        }

        async function predict() {
            const img = document.getElementById("face-image");
            const prediction = await model.predict(img);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            document.getElementById("result-container").style.display = "block";

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0);
                
                const resultBar = document.createElement("div");
                resultBar.classList.add("result-bar-wrapper");
                resultBar.innerHTML = `
                    <div class="label-name">${className === "dog" ? "🐶 강아지상" : "🐱 고양이상"}</div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${probability}%"></div>
                    </div>
                    <div class="percent">${probability}%</div>
                `;
                labelContainer.appendChild(resultBar);
            }
        }
    </script>
</body>
</html>
