<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - 로또 & AI</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-adsense-account" content="ca-pub-8224231015531870">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8224231015531870"
     crossorigin="anonymous"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">로또번호 생성</a>
        <a href="animal-test.html">동물상 테스트</a>
        <a href="contact.html" class="active">제휴 문의</a>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 모드 전환</button>
    </nav>

    <div class="contact-section">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xojyydan" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="성함/업체명" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="이메일 주소" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>
</html>
